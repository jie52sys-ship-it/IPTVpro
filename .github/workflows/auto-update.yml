# 工作流名称（可自定义，纯中文也可以）
name: 自动解密更新酷9直播源

# 事件触发规则（核心：解决“没有定义事件触发”报错）
on:
  # 定时触发：每12小时执行一次（UTC时间，对应国内+8小时）
  schedule:
    - cron: "0 */12 * * *"
  # 手动触发：支持在Actions页面手动点击运行
  workflow_dispatch:

# 执行的任务
jobs:
  # 任务名称
  update-iptv-source:
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    # 任务步骤
    steps:
      # 步骤1：拉取仓库代码到运行环境
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 步骤2：配置Python 3.11环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 步骤3：安装脚本依赖（requests）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 步骤4：执行解析脚本
      - name: Run decrypt script
        run: python scripts/decrypt_and_fetch.py

      # 步骤5：提交更新后的文件到仓库
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@noreply.github.com"
          # 添加生成的直播源文件
          git add live.m3u live.txt || true
          # 提交（无更新则跳过，避免报错）
          git commit -m "Auto update IPTV source $(date '+%Y-%m-%d %H:%M:%S')" || true
          # 推送到仓库
          git push
