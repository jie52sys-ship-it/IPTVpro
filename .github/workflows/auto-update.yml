name: 自动解密更新酷9直播源
on:
  schedule:
    - cron: "0 */12 * * *"  # 每12小时自动解密更新一次
  workflow_dispatch:  # 支持手动触发更新

jobs:
  decrypt-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 执行解密解析脚本
        run: python scripts/decrypt_and_fetch.py

      - name: 提交更新到仓库
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@github.com"
          git add live.m3u live.txt
          git commit -m "自动解密更新直播源 $(date '+%Y-%m-%d %H:%M')" || true
          git push

